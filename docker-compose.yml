name: bosun

services:
  bosun:
    build:
      context: .
      dockerfile: ./bots/bosun/Dockerfile
    env_file:
      - path: ./bots/bosun/.env
        required: true
    environment:
      PACTO_LOG_LEVEL: ${PACTO_LOG_LEVEL:-info}
      PACTO_GOVERNANCE_BOT_ID: ${PACTO_GOVERNANCE_BOT_ID:-bosun}
      PACTO_GOVERNANCE_RPC_URL: ${PACTO_GOVERNANCE_RPC_URL:-http://anvil:8545}
      PACTO_GOVERNANCE_DAEMON_SOCKET: ${PACTO_GOVERNANCE_DAEMON_SOCKET:-/var/lib/pacto-bot-api/pacto-bot-api.sock}
      PACTO_GOVERNANCE_SQUAD_INDEX: ${PACTO_GOVERNANCE_SQUAD_INDEX:-0}
      # PACTO_GOVERNANCE_GROUP_ID, CAPTAIN, CREW_CANDIDATES, PROPOSER_CANDIDATES,
      # REGISTRY, and HATS are loaded from bots/bosun/.env via env_file.
    networks:
      - pacto
    volumes:
      - pacto-bot-api-data:/var/lib/pacto-bot-api
    restart: on-failure

networks:
  pacto:
    external: true

volumes:
  pacto-bot-api-data:
    external: true
    name: pacto-bot-api-data
