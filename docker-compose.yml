name: bosun

services:
  bosun:
    build:
      context: .
      dockerfile: ./bots/bosun/Dockerfile
    environment:
      PACTO_LOG_LEVEL: ${PACTO_LOG_LEVEL:-info}
      PACTO_GOVERNANCE_BOT_ID: ${PACTO_GOVERNANCE_BOT_ID:-bosun}
      PACTO_GOVERNANCE_GROUP_ID: ${PACTO_GOVERNANCE_GROUP_ID:-local-dev-squad}
      PACTO_GOVERNANCE_RPC_URL: ${PACTO_GOVERNANCE_RPC_URL:-http://anvil:8545}
      PACTO_GOVERNANCE_DAEMON_SOCKET: ${PACTO_GOVERNANCE_DAEMON_SOCKET:-/var/lib/pacto-bot-api/pacto-bot-api.sock}
      PACTO_GOVERNANCE_CADENCE_SECONDS: ${PACTO_GOVERNANCE_CADENCE_SECONDS:-86400}
      PACTO_GOVERNANCE_SQUAD_INDEX: ${PACTO_GOVERNANCE_SQUAD_INDEX:-0}
      PACTO_GOVERNANCE_CAPTAIN: ${PACTO_GOVERNANCE_CAPTAIN:-0x0000000000000000000000000000000000000000}
      PACTO_GOVERNANCE_CREW_CANDIDATES: ${PACTO_GOVERNANCE_CREW_CANDIDATES:-}
      PACTO_GOVERNANCE_PROPOSER_CANDIDATES: ${PACTO_GOVERNANCE_PROPOSER_CANDIDATES:-}
      PACTO_GOVERNANCE_REGISTRY: ${PACTO_GOVERNANCE_REGISTRY:-}
      PACTO_GOVERNANCE_HATS: ${PACTO_GOVERNANCE_HATS:-}
    networks:
      - pacto
    volumes:
      - pacto-bot-api-data:/var/lib/pacto-bot-api:ro
    restart: on-failure

networks:
  pacto:
    external: true

volumes:
  pacto-bot-api-data:
    external: true
